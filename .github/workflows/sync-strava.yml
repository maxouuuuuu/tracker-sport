name: Sync Strava Activities

on:
  schedule:
    - cron: '0 */4 * * *'   # Toutes les 4 heures
  workflow_dispatch:          # Déclenchement manuel depuis GitHub

permissions:
  contents: write   # Nécessaire pour committer data.json

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer requests
        run: pip install requests

      - name: Test connexion Strava
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          echo "client_id = $STRAVA_CLIENT_ID"
          echo "refresh_token (12 chars) = ${STRAVA_REFRESH_TOKEN:0:12}..."
          python3 -c "
          import os, requests
          r = requests.post('https://www.strava.com/oauth/token', data={
            'client_id':     os.environ['STRAVA_CLIENT_ID'],
            'client_secret': os.environ['STRAVA_CLIENT_SECRET'],
            'grant_type':    'refresh_token',
            'refresh_token': os.environ['STRAVA_REFRESH_TOKEN'],
          })
          print('Status:', r.status_code)
          print('Response:', r.text[:300])
          "

      - name: Récupérer les activités Strava
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python sync_strava.py

      - name: Committer data.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json _strava_refresh.txt
          git diff --staged --quiet || git commit -m "🏃 Sync Strava $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
